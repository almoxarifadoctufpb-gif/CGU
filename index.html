<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor de Estudos · AFFC CGU 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js">
    </script>
    <style>
        :root {
            --primary: #820AD1;
            --primary-hover: #9333EA;
            --primary-dark: #6811B8;
            --primary-soft: #F3E8FF;
            --primary-light: #A855F7;
            --bg: #F8F7FC;
            --surface: #FFFFFF;
            --surface-alt: #FAFAFD;
            --text-primary: #18181B;
            --text-secondary: #71717A;
            --muted: #A1A1AA;
            --border: #ECEAF3;
            --success: #22C55E;
            --success-soft: #DCFCE7;
            --warning: #F59E0B;
            --warning-soft: #FEF3C7;
            --danger: #EF4444;
            --danger-soft: #FEE2E2;
            --zebra-odd: #FAFAFD;
            --zebra-even: #FFFFFF;
            --sidebar-w: 260px;
            --header-h: 64px;
            --radius: 20px;
            --radius-sm: 14px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 4px 16px rgba(130, 10, 209, 0.06);
            --shadow-lg: 0 10px 30px rgba(130, 10, 209, 0.08);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-w);
            background: linear-gradient(180deg, #1a0a2e 0%, #1e1035 100%);
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition);
            box-shadow: 0 20px 48px rgba(130, 10, 209, 0.12);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        .sidebar-header {
            padding: 18px 16px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
        }
        .sidebar-header .logo-img {
            width: 110px;
            height: 110px;
            border-radius: 24px;
            object-fit: contain;
            margin: 0 auto 10px;
            background: rgba(255,255,255,0.08);
            padding: 8px;
            box-shadow: 0 12px 40px rgba(130, 10, 209, 0.8), 0 0 60px rgba(130, 10, 209, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: block;
        }
        .sidebar-header .logo-img:hover {
            transform: scale(1.08);
            box-shadow: 0 16px 48px rgba(130, 10, 209, 0.95), 0 0 80px rgba(130, 10, 209, 0.6);
        }
        .sidebar-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-top: 4px;
        }
        .sidebar-header .subtitle {
            font-size: 0.66rem;
            opacity: 0.45;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .sidebar-nav {
            flex: 1;
            padding: 8px 12px;
            overflow-y: auto;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.87rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 2px;
        }
        .sidebar-nav a:hover {
            background: rgba(130, 10, 209, 0.2);
            color: #fff;
            transform: translateX(2px);
        }
        .sidebar-nav a.active {
            background: rgba(130, 10, 209, 0.3);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 16px rgba(130, 10, 209, 0.4);
        }
        .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.66rem;
            opacity: 0.35;
            text-align: center;
        }
        /* MAIN */
        .main {
            flex: 1;
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            width: calc(100% - var(--sidebar-w));
        }
        .topbar {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(14px);
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .topbar h1 {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .content {
            padding: 28px 32px;
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeSlideIn 0.4s ease;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px 28px;
            margin-bottom: 20px;
            border: 1px solid rgba(130, 10, 209, 0.06);
            transition: all var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-header h3 {
            font-size: 1.05rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            border-radius: 24px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-basicas {
            background: #F3E8FF;
            color: #6811B8;
        }
        .badge-especificas {
            background: #FEF3C7;
            color: #92400E;
        }
        .badge-especializadas {
            background: #DCFCE7;
            color: #065F46;
        }
        .badge-peso {
            background: #F4F4F5;
            color: #52525B;
        }

        .progress-bar {
            height: 10px;
            background: #F4F4F5;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 20px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(90deg, #820AD1 0%, #A855F7 100%);
            box-shadow: 0 0 16px rgba(130, 10, 209, 0.35);
        }
        .progress-fill.low {
            background: linear-gradient(90deg, #EF4444, #F87171);
            box-shadow: 0 0 14px rgba(239, 68, 68, 0.3);
        }
        .progress-fill.mid {
            background: linear-gradient(90deg, #F59E0B, #FBBF24);
            box-shadow: 0 0 14px rgba(245, 158, 11, 0.3);
        }
        .progress-fill.high {
            background: linear-gradient(90deg, #22C55E, #4ADE80);
            box-shadow: 0 0 14px rgba(34, 197, 94, 0.3);
        }
        .btn {
            padding: 9px 18px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(130, 10, 209, 0.3);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #E4E4E7;
            color: var(--text-primary);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.72rem;
        }
        .btn-accent {
            background: #22C55E;
            color: #fff;
        }
        .btn-warning {
            background: #F59E0B;
            color: #fff;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 22px 24px;
            border: 1px solid rgba(130, 10, 209, 0.06);
            box-shadow: var(--shadow);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .kpi-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .kpi-icon.purple {
            background: #F3E8FF;
            color: #820AD1;
        }
        .kpi-icon.green {
            background: #DCFCE7;
            color: #059669;
        }
        .kpi-icon.amber {
            background: #FEF3C7;
            color: #D97706;
        }
        .kpi-icon.blue {
            background: #DBEAFE;
            color: #2563EB;
        }
        .kpi-info .kpi-value {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.4px;
            line-height: 1.1;
        }
        .kpi-info .kpi-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .table-wrap {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.84rem;
        }
        th,
        td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: var(--surface-alt);
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tbody tr:nth-child(odd) {
            background: var(--zebra-odd);
        }
        tbody tr:nth-child(even) {
            background: var(--zebra-even);
        }
        tbody tr:hover td {
            background: #F3E8FF !important;
        }

        .disciplina-row:nth-child(odd) {
            background: var(--zebra-odd);
        }
        .disciplina-row:nth-child(even) {
            background: var(--zebra-even);
        }
        .disciplina-row:hover {
            background: #F3E8FF !important;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-height: 300px;
        }
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        /* FOGUETE */
        .foguete-container {
            position: relative;
            margin: 20px 0 30px;
            padding: 10px 0;
        }
        .foguete-track {
            height: 16px;
            background: linear-gradient(90deg, #F4F4F5 0%, #E9D5FF 50%, #C084FC 100%);
            border-radius: 20px;
            position: relative;
            overflow: visible;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.04);
        }
        .foguete-progress {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #820AD1, #A855F7, #C084FC);
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(130, 10, 209, 0.5);
        }
        .foguete-icone {
            position: absolute;
            top: -28px;
            font-size: 2.2rem;
            color: #820AD1;
            transition: left 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 4px 8px rgba(130, 10, 209, 0.5));
            transform: translateX(-50%);
            z-index: 5;
            animation: fogueteFlutuar 2s ease-in-out infinite;
        }
        @keyframes fogueteFlutuar {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-6px);
            }
        }
        .foguete-label {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: -28px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--primary);
            transition: left 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }

        .motivational-card {
            background: linear-gradient(135deg, #F8F7FC 0%, #F3E8FF 100%);
            border-radius: var(--radius);
            padding: 24px 28px;
            margin-bottom: 24px;
            border: 1px solid var(--primary-soft);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
        }
        .motivational-card::before {
            content: '\201C';
            position: absolute;
            top: -10px;
            left: 16px;
            font-size: 8rem;
            color: rgba(130, 10, 209, 0.06);
            font-family: Georgia, serif;
            line-height: 1;
            pointer-events: none;
        }
        .motivational-card .frase-texto {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
            position: relative;
            z-index: 1;
            letter-spacing: -0.1px;
        }
        .motivational-card .frase-categoria {
            font-size: 0.72rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-top: 8px;
            opacity: 0.8;
        }
        .motivational-card .frase-nav {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 12px;
            position: relative;
            z-index: 1;
        }
        .motivational-card .frase-nav button {
            background: rgba(130, 10, 209, 0.08);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--primary);
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .motivational-card .frase-nav button:hover {
            background: var(--primary);
            color: #fff;
        }

        .search-input {
            padding: 10px 16px;
            border: 2px solid var(--border);
            border-radius: 30px;
            font-size: 0.85rem;
            font-family: var(--font);
            width: 240px;
            max-width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            border-color: var(--primary);
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            padding: 28px 32px;
            max-width: 750px;
            width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 48px rgba(130, 10, 209, 0.15);
            position: relative;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #18181B;
            color: #fff;
            padding: 12px 22px;
            border-radius: 28px;
            font-size: 0.82rem;
            z-index: 999;
            animation: toastIn 0.35s ease;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .hidden {
            display: none !important;
        }
        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
        }
        .overlay-bg {
            position: fixed;
            inset: 0;
            background: rgba(24, 24, 27, 0.5);
            z-index: 99;
        }
        .insight-box {
            background: #F8F7FC;
            border-radius: 16px;
            padding: 18px 20px;
            border-left: 4px solid #820AD1;
            margin-bottom: 16px;
        }
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .tag-high {
            background: #FEE2E2;
            color: #DC2626;
        }
        .tag-medium {
            background: #FEF3C7;
            color: #D97706;
        }
        .tag-low {
            background: #DCFCE7;
            color: #059669;
        }

        .topico-item:nth-child(odd) {
            background: #FAFAFD;
        }
        .topico-item:nth-child(even) {
            background: #FFFFFF;
        }

        /* Botões de estado do tópico */
        .estado-btns {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .estado-btn {
            padding: 4px 10px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-size: 0.68rem;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: var(--font);
        }
        .estado-btn.estado-ativo-0 {
            background: #F4F4F5;
            border-color: #D4D4D8;
            color: #52525B;
        }
        .estado-btn.estado-ativo-1 {
            background: #FEF3C7;
            border-color: #F59E0B;
            color: #92400E;
        }
        .estado-btn.estado-ativo-2 {
            background: #DCFCE7;
            border-color: #22C55E;
            color: #065F46;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main {
                margin-left: 0;
                width: 100%;
            }
            .hamburger {
                display: block;
            }
            .topbar {
                padding: 0 16px;
            }
            .content {
                padding: 20px 16px;
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
            .hero {
                padding: 24px 20px !important;
            }
            .hero h2 {
                font-size: 1.5rem !important;
            }
            .hero-stats {
                gap: 12px;
            }
            .hero-stat {
                padding: 10px 14px;
            }
            .hero-stat .hero-stat-value {
                font-size: 1.3rem;
            }
            .kpi-grid {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            }
            .foguete-icone {
                top: -20px;
                font-size: 1.8rem;
            }
            .foguete-label {
                bottom: -22px;
                font-size: 0.75rem;
            }
            .disciplina-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .disc-stats {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 600px) {
            .hero {
                padding: 18px 16px !important;
            }
            .hero h2 {
                font-size: 1.3rem !important;
            }
            .hero-stats {
                flex-direction: column;
                gap: 8px;
            }
            .hero-stat {
                padding: 8px 12px;
            }
            .hero-stat .hero-stat-value {
                font-size: 1.1rem;
            }
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 16px;
            }
            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .btn {
                padding: 6px 12px;
                font-size: 0.72rem;
            }
            .foguete-icone {
                top: -16px;
                font-size: 1.5rem;
            }
            .foguete-label {
                bottom: -20px;
                font-size: 0.7rem;
            }
            .disciplina-row .disc-stats {
                gap: 8px;
                flex-wrap: wrap;
            }
            .search-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://res.cloudinary.com/dqmuoc3o0/image/upload/v1780049455/LOGO_bbqykr.png" 
                 alt="Logo CGU AFFC" 
                 class="logo-img"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
            <i class="fa-solid fa-graduation-cap" style="font-size:42px;color:#C084FC;display:none;margin-bottom:10px;"></i>
            <h2>AFFC CGU</h2>
            <span class="subtitle">Gestor de Estudos</span>
        </div>
        <nav class="sidebar-nav">

        const progressoCache = {};

        function getProgressoDisciplinaCache(discId) {
            if (progressoCache[discId]) return progressoCache[discId];
            const disc = editalData.disciplinas.find(d => d.id === discId);
            if (!disc || !disc.topicos || disc.topicos.length === 0) return { pct: 0, concluidos: 0, iniciados: 0,
                total: 0 };
            const total = disc.topicos.length;
            let concluidos = 0;
            let iniciados = 0;
            disc.topicos.forEach((_, i) => {
                const estado = appState.topicosConcluidos[`${discId}-${i}`] || 0;
                if (estado === 2) concluidos++;
                else if (estado === 1) iniciados++;
            });
            // Percentual base: concluídos = 100%, iniciados = 50% de avanço
            const pct = Math.round(((concluidos + iniciados * 0.5) / total) * 100);
            const res = { pct, concluidos, iniciados, total };
            progressoCache[discId] = res;
            return res;
        }

        function invalidateProgressoCache(discId) { delete progressoCache[discId]; }

        function invalidateAllCache() { for (let k in progressoCache) delete progressoCache[k]; }

        function carregarState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    appState = { ...appState, ...parsed };
                    // Migração de dados antigos (boolean true) para novo formato numérico
                    if (appState.topicosConcluidos) {
                        const migrado = {};
                        for (const [key, val] of Object.entries(appState.topicosConcluidos)) {
                            if (val === true || val === 1 || val === 2) {
                                migrado[key] = val === true ? 2 : val; // true antigo vira Concluído (2)
                            } else if (val === false || val === 0) {
                                migrado[key] = 0; // Não iniciado
                            } else {
                                migrado[key] = 0; // fallback
                            }
                        }
                        appState.topicosConcluidos = migrado;
                    }
                }
                if (!appState.topicosConcluidos) appState.topicosConcluidos = {};
                if (!appState.questoes) appState.questoes = {};
                if (!appState.anotacoes) appState.anotacoes = {};
                if (!appState.metasPorDisciplina) appState.metasPorDisciplina = {};
                if (!appState.historicoDiario) appState.historicoDiario = {};
                invalidateAllCache();
            } catch (e) {}
        }

        function salvarState() { appState.ultimaAtividade = new Date().toISOString();

            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.add('hidden'), 2800); }

        function getProgressoDisciplina(discId) { return getProgressoDisciplinaCache(discId); }

        function getProgressoGeral() {
            let total = 0,
                concluidos = 0,
                iniciados = 0;
            editalData.disciplinas.forEach(d => {
                if (!d.topicos) return;
                d.topicos.forEach((_, i) => {
                    total++;
                    const estado = appState.topicosConcluidos[`${d.id}-${i}`] || 0;
                    if (estado === 2) concluidos++;
                    else if (estado === 1) iniciados++;
                });
            });
            const pct = total > 0 ? Math.round(((concluidos + iniciados * 0.5) / total) * 100) : 0;
            return { pct, concluidos, iniciados, total };
        }

        function getTotalQuestoes() {
            let total = 0,
                corretas = 0;
            Object.values(appState.questoes).forEach(q => {
                total += (q.resolvidas || 0);
                corretas += (q.corretas || 0);
            });
            return { total, corretas, pct: total > 0 ? Math.round((corretas / total) * 100) : 0 };
        }

        function getQuestoesDisciplina(id) { return appState.questoes[id] || { resolvidas: 0, corretas: 0 }; }

        function getStreak() { const hoje = new Date();
            hoje.setHours(0, 0, 0, 0); let streak = 0; const check = new Date(hoje); while (true) { const key = check
                    .toISOString().split('T')[0]; if (appState.historicoDiario[key]) { streak++;
                    check.setDate(check.getDate() - 1); } else break; } return streak; }

        function registrarAtividadeHoje() { const hoje = new Date().toISOString().split('T')[0];
            appState.historicoDiario[hoje] = true;
            salvarState(); }

        function exportarBackup() {
            const dados = JSON.stringify(appState, null, 2);
            const blob = new Blob([dados], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_affc_cgu_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            toast('<i class="fa-solid fa-download"></i> Backup exportado!');
        }

        function importarBackup() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
                reader.onload = (event) => { try { const dados = JSON.parse(event.target.result); if (dados
                            .topicosConcluidos === undefined || dados.questoes === undefined) throw new Error(
                            'Inválido'); if (confirm(
                            '⚠️ Substituir todos os dados pelo backup?')) { appState = { ...appState,
                            ...dados };
                        carregarState(); // re-migrar após restore
                        salvarState();
                        toast('<i class="fa-solid fa-upload"></i> Restaurado!');
                        setTimeout(() => location.reload(), 1500); } } catch (err) { toast(
                            '<i class="fa-solid fa-circle-exclamation"></i> Arquivo inválido.'); } };
                reader.readAsText(file); };
            input.click();
        }

            chartInstances = {}; }

        function navegar(tab) {

            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
            const link = document.querySelector(`.sidebar-nav a[data-tab="${tab}"]`);
            if (link) link.classList.add('active');
            const icons = { 'dashboard': 'fa-chart-pie', 'disciplinas': 'fa-book-open', 'questoes': 'fa-file-pen',

            const titles = { 'dashboard': 'Dashboard', 'disciplinas': 'Disciplinas', 'questoes': 'Questões',

            renderizarTab(tab);

        function setEstadoTopico(discId, i, estado) {
            const key = `${discId}-${i}`;
            if (estado === 0) delete appState.topicosConcluidos[key];
            else appState.topicosConcluidos[key] = estado;
            invalidateProgressoCache(discId);
            registrarAtividadeHoje();
            salvarState();
            // Atualizar visualmente apenas os botões de estado sem fechar o modal
            const modal = document.getElementById('modalDisciplina');
            if (modal) {
                const botoes = modal.querySelectorAll(`.topico-item`)[i]?.querySelectorAll('.estado-btn');
                if (botoes) {
                    botoes.forEach(btn => {
                        btn.classList.remove('estado-ativo-0', 'estado-ativo-1', 'estado-ativo-2');
                        const btnEstado = parseInt(btn.getAttribute('onclick').match(/setEstadoTopico\([^,]+,\d+,(\d)\)/)[1]);
                        if (btnEstado === estado) btn.classList.add(`estado-ativo-${estado}`);
                    });
                }
                // Atualizar cabeçalho de progresso no modal
                const p = getProgressoDisciplina(discId);
                const h4 = modal.querySelector('h4');
                if (h4) h4.textContent =
                    `Tópicos do Edital (${p.concluidos} concluídos / ${p.iniciados} iniciados / ${p.total} total)`;
                const progressoTexto = modal.querySelector('p strong');
                if (progressoTexto) progressoTexto.textContent = `${p.pct}%`;
            }
        }

        function marcarTodos(discId, estado) {
            const mensagens = { 0: 'Tem certeza que deseja resetar todos os tópicos? Isso zerará o progresso desta disciplina.',
                1: 'Marcar todos como Iniciados?', 2: 'Marcar todos como Concluídos?' };
            if (estado === 0 && !confirm(mensagens[0])) return;
            if (!confirm(mensagens[estado] || 'Confirmar?')) return;
            const disc = editalData.disciplinas.find(d => d.id === discId);
            if (!disc) return;
            disc.topicos.forEach((_, i) => {
                const key = `${discId}-${i}`;
                if (estado === 0) delete appState.topicosConcluidos[key];
                else appState.topicosConcluidos[key] = estado;
            });
            invalidateProgressoCache(discId);
            registrarAtividadeHoje();
            salvarState();
            fecharModal();
            toast(estado === 2 ? 'Todos marcados como concluídos!' : estado === 1 ? 'Todos marcados como iniciados!' :
                'Todos resetados!');
        }

        function atualizarQuestoes(discId) { const r = parseInt(document.getElementById('qtdResolvidas')?.value) || 0;
            const c = Math.min(r, parseInt(document.getElementById('qtdCorretas')?.value) || 0);
            appState.questoes[discId] = { resolvidas: r, corretas: c };
            registrarAtividadeHoje();
            salvarState(); }

        function salvarAnotacao(discId) { appState.anotacoes[discId] = document.getElementById('anotacaoDisc')?.value || '';
            salvarState();
            toast('Anotação salva!'); }

        function renderQuestoes() {
            const t = getTotalQuestoes();
            let html =
                `<div class="card"><div class="card-header"><h3><i class="fa-solid fa-file-pen"></i> Controle de Questões</h3></div><p>Total: <strong>${t.total}</strong> · Corretas: <strong>${t.corretas}</strong> · <strong>${t.pct}%</strong> acerto</p><div class="progress-bar"><div class="progress-fill${t.pct<50?' low':t.pct<75?' mid':' high'}" style="width:${t.pct}%;"></div></div></div><div class="card"><div class="card-header"><h3>Por Disciplina</h3></div><div class="table-wrap"><table><thead><tr><th>Disciplina</th><th>Resolvidas</th><th>Corretas</th><th>%</th><th>Ações</th></tr></thead><tbody>`;
            editalData.disciplinas.forEach(d => { const q = getQuestoesDisciplina(d.id); const p = q.resolvidas > 0 ? Math
                    .round((q.corretas / q.resolvidas) * 100) : 0;
                html +=
                    `<tr><td>${getIcon(d.id)} ${d.nome}</td><td>${q.resolvidas||0}</td><td>${q.corretas||0}</td><td><strong>${p}%</strong></td><td><button class="btn btn-sm btn-primary" onclick="abrirDisciplina('${d.id}')"><i class="fa-solid fa-gear"></i></button> <button class="btn btn-sm btn-outline" onclick="addQuestoes('${d.id}')">+10</button></td></tr>`; });
            return html + `</tbody></table></div></div>`;
        }

        function addQuestoes(discId) { if (!appState.questoes[discId]) appState.questoes[discId] = { resolvidas: 0,
                corretas: 0 };
            appState.questoes[discId].resolvidas += 10;
            appState.questoes[discId].corretas += 7;
            registrarAtividadeHoje();
            salvarState();
            renderizarTab('questoes');
            toast('+10 questões!'); }

        function renderMetas() {
            const dias = Math.max(1, Math.floor((new Date() - new Date(appState.dataInicio)) / (1000 * 60 * 60 * 24)));
            const totalQ = getTotalQuestoes();
            const metaAc = appState.metaQuestoesDiaria * dias;
            const pctMeta = Math.min(100, Math.round((totalQ.total / metaAc) * 100));
            return `
            <div class="card"><div class="card-header"><h3><i class="fa-solid fa-bullseye"></i> Metas Gerais</h3></div>
                <div style="display:flex;gap:12px;margin:8px 0;"><label style="font-weight:600;">Questões/dia:</label><input type="number" id="metaQDiaria" value="${appState.metaQuestoesDiaria}" style="width:80px;padding:8px;border:2px solid var(--border);border-radius:8px;"></div>
                <div style="display:flex;gap:12px;margin:8px 0;"><label style="font-weight:600;">Horas/dia:</label><input type="number" id="metaHDiaria" value="${appState.metaHorasDiaria}" step="0.5" style="width:80px;padding:8px;border:2px solid var(--border);border-radius:8px;"></div>
                <div style="display:flex;gap:12px;margin:8px 0;"><label style="font-weight:600;">Revisões/semana:</label><input type="number" id="metaRevSemana" value="${appState.metaRevisoesSemana}" style="width:80px;padding:8px;border:2px solid var(--border);border-radius:8px;"></div>
                <div style="display:flex;gap:12px;margin:8px 0;"><label style="font-weight:600;">Data início:</label><input type="date" id="dataInicio" value="${appState.dataInicio}" style="padding:8px;border:2px solid var(--border);border-radius:8px;"></div>
                <button class="btn btn-accent" onclick="salvarMetasGerais()">Salvar</button>
            </div>
            <div class="card"><div class="card-header"><h3>Acompanhamento</h3></div><p>${dias} dias · Meta: <strong>${metaAc}</strong> · Realizado: <strong>${totalQ.total}</strong> (${pctMeta}%)</p><div class="progress-bar"><div class="progress-fill${pctMeta<50?' low':pctMeta<80?' mid':' high'}" style="width:${pctMeta}%;"></div></div></div>
            <div class="card"><div class="card-header"><h3>Metas por Disciplina</h3></div><div class="table-wrap"><table><thead><tr><th>Disciplina</th><th>Meta</th><th>Realizado</th></tr></thead><tbody>${editalData.disciplinas.map(d=>{const m=appState.metasPorDisciplina[d.id]?.questoes||0;const r=(appState.questoes[d.id]?.resolvidas)||0;return`<tr><td>${getIcon(d.id)} ${d.nome}</td><td><input type="number" value="${m}" style="width:80px;" onchange="atualizarMetaDisciplina('${d.id}','questoes',this.value)"></td><td>${r}</td></tr>`;}).join('')}</tbody></table></div></div>
            <div class="card" style="border:2px solid #820AD1;"><div class="card-header"><h3><i class="fa-solid fa-database" style="color:#820AD1;"></i> Backup</h3></div><p style="font-size:0.85rem;margin-bottom:16px;">Exporte seus dados para segurança.</p><div style="display:flex;gap:12px;"><button class="btn btn-primary" onclick="exportarBackup()"><i class="fa-solid fa-download"></i> Exportar</button><button class="btn btn-warning" onclick="importarBackup()"><i class="fa-solid fa-upload"></i> Restaurar</button></div></div>`;
        }

        function salvarMetasGerais() { appState.metaQuestoesDiaria = parseInt(document.getElementById('metaQDiaria')?.value) ||
                50;
            appState.metaHorasDiaria = parseFloat(document.getElementById('metaHDiaria')?.value) || 5;
            appState.metaRevisoesSemana = parseInt(document.getElementById('metaRevSemana')?.value) || 4;
            appState.dataInicio = document.getElementById('dataInicio')?.value || appState.dataInicio;
            salvarState();
            toast('Metas salvas!');
            renderizarTab('metas'); }

        function atualizarMetaDisciplina(discId, tipo, val) { if (!appState.metasPorDisciplina[discId]) appState
                .metasPorDisciplina[discId] = { questoes: 0, horas: 0 };
            appState.metasPorDisciplina[discId][tipo] = parseInt(val) || 0;
            salvarState(); }

        function renderEstatisticas() {
            const geral = getProgressoGeral();
            const questoes = getTotalQuestoes();
            const dias = Math.max(1, Math.floor((new Date() - new Date(appState.dataInicio)) / (1000 * 60 * 60 * 24)));
            let notaEstimada = 0,
                notaMaxima = 0;
            editalData.disciplinas.forEach(d => { const qtd = dadosProvaCGU.distribuição[d.id] || 0; const prog =
                    getProgressoDisciplina(d.id).pct / 100; const peso = dadosProvaCGU.pesoMedioPorDisciplina[d.id] ||
                    1;
                notaEstimada += qtd * prog * (peso / 2);
                notaMaxima += qtd * (peso / 2); });
            const notaProjetada = Math.round((notaMaxima > 0 ? Math.round((notaEstimada / notaMaxima) * 100) : 0) / 100 *
                dadosProvaCGU.totalQuestoes);
            const criticas = editalData.disciplinas.map(d => ({ id: d.id, nome: d.nome, questoesProva: dadosProvaCGU
                    .distribuição[d.id] || 0, progresso: getProgressoDisciplina(d.id).pct,
                gap: ((dadosProvaCGU.distribuição[d.id] || 0) * (100 - getProgressoDisciplina(d.id).pct) / 100) }))
                .sort((a, b) => b.gap - a.gap);
            const topCriticas = criticas.slice(0, 5);
            return `
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-icon purple"><i class="fa-solid fa-chart-pie"></i></div><div class="kpi-info"><div class="kpi-value">${geral.pct}%</div><div class="kpi-label">Progresso</div></div></div>
                <div class="kpi-card"><div class="kpi-icon green"><i class="fa-solid fa-calendar"></i></div><div class="kpi-info"><div class="kpi-value">${dias}</div><div class="kpi-label">Dias</div></div></div>
                <div class="kpi-card"><div class="kpi-icon amber"><i class="fa-solid fa-file-pen"></i></div><div class="kpi-info"><div class="kpi-value">${questoes.total}</div><div class="kpi-label">Questões</div></div></div>
                <div class="kpi-card"><div class="kpi-icon blue"><i class="fa-solid fa-gauge-high"></i></div><div class="kpi-info"><div class="kpi-value">${(questoes.total/dias).toFixed(1)}</div><div class="kpi-label">Média/dia</div></div></div>
            </div>
            <div class="card" style="border:2px solid #820AD1;"><div class="card-header"><h3>Coaching Estratégico</h3></div><div class="insight-box"><strong>Nota Projetada:</strong> <span style="font-size:1.4rem;font-weight:800;color:#820AD1;">~${notaProjetada} pts</span> de ${dadosProvaCGU.totalQuestoes} | Corte: ${dadosProvaCGU.notaCorteEstimada} pts</div></div>
            <div class="charts-row">
                <div class="card"><div class="card-header"><h3>Distribuição na Prova</h3></div><div class="chart-container"><canvas id="chartDistribuicaoProva"></canvas></div></div>
                <div class="card"><div class="card-header"><h3>Progresso vs Importância</h3></div><div class="chart-container"><canvas id="chartImportanciaProgresso"></canvas></div></div>
            </div>
            <div class="card"><div class="card-header"><h3>Radar de Desempenho</h3></div><div class="chart-container" style="max-height:400px;"><canvas id="chartRadarDesempenho"></canvas></div></div>
            <div class="card"><div class="card-header"><h3>Top 5 Críticas</h3></div><div class="table-wrap"><table><thead><tr><th>Disciplina</th><th>Qtd</th><th>Prog</th><th>Gap</th></tr></thead><tbody>${topCriticas.map(d=>`<tr><td>${getIcon(d.id)} ${d.nome}</td><td>${d.questoesProva}</td><td>${d.progresso}%</td><td>${Math.round(d.gap)} pts</td></tr>`).join('')}</tbody></table></div></div>`;
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('hidden'); }

        function fecharSidebar() { document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.add('hidden'); }

        function init() {
            carregarState();
            document.getElementById('dateText').textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long',
                day: 'numeric', month: 'long', year: 'numeric' });
            editalData.disciplinas.forEach(d => { if (!appState.questoes[d.id]) appState.questoes[d.id] = { resolvidas: 0,
                    corretas: 0 }; if (!appState.metasPorDisciplina[d.id]) appState.metasPorDisciplina[d.id] = {
                    questoes: 0,
                    horas: 0 }; });
            salvarState();
            navegar('dashboard');
        }
        document.addEventListener('DOMContentLoaded', init);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { fecharModal();
                fecharSidebar(); } });
        window.addEventListener('beforeunload', () => salvarState());
    </script>
</body>
</html>
